name: RDP + Tailscale + RustDesk Minimal

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth key (reusable or ephemeral)"
        required: true
      rdp_count:
        description: "How many RDP instances (1-10)"
        required: false
        default: "1"

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - id: mk
        run: |
          $n = [int]"${{ inputs.rdp_count }}"
          if ($n -lt 1) { $n = 1 }
          if ($n -gt 10) { $n = 10 }
          $inc = @(); for ($i=1; $i -le $n; $i++){ $inc += @{ id = $i } }
          $json = @{ include = $inc } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
    timeout-minutes: 360
    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345
      TS_HOSTNAME: bullet${{ matrix.id }}

    steps:
      - name: Install & Connect Tailscale
        run: |
          $tsExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsExe)) {
            Write-Host "Downloading latest Tailscale EXE..."
            $dst = "$env:TEMP\tailscale-setup.exe"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile $dst
            Write-Host "Installing Tailscale silently..."
            Start-Process -FilePath $dst -ArgumentList "/quiet" -Wait -NoNewWindow
            Remove-Item $dst -Force
          }

          Write-Host "Connecting to Tailscale..."
          Start-Sleep -Seconds 3
          
          # --unattended prevents hangs; --accept-dns=false prevents the runner from losing internet
          & $tsExe up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --unattended --accept-routes --accept-dns=false
          $ip4 = & $tsExe ip -4 | Select-Object -First 1
          Write-Host "Tailscale IP: $ip4"

      - name: Enable RDP User & Firewall
        run: |
          $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force
          New-LocalUser -Name $env:RDP_USER -Password $sec -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $env:RDP_USER
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $env:RDP_USER
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Write-Host "RDP ready."

      - name: Install RustDesk
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (-not (Test-Path $rdExe)) {
            $rdUrl = "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.msi"
            $msi = "$env:TEMP\rustdesk.msi"
            Invoke-WebRequest -Uri $rdUrl -OutFile $msi
            Start-Process msiexec.exe -ArgumentList "/i","`"$msi`"","/quiet","/norestart" -Wait
            Remove-Item $msi -Force
          }

      - name: Open RustDesk Ports & Launch
        run: |
          for ($p=21115; $p -le 21119; $p++) {
            netsh advfirewall firewall add rule name="APP-PORT-TCP-$p" dir=in action=allow protocol=TCP localport=$p | Out-Null
          }
          netsh advfirewall firewall add rule name="APP-PORT-UDP-21116" dir=in action=allow protocol=UDP localport=21116 | Out-Null

          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          Start-Process -FilePath $rdExe -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 6

          # Take screenshot natively using Windows Forms
          $screenshotPath = ".\rustdesk_${{ matrix.id }}.png"
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $bitmap.Save($screenshotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose(); $bitmap.Dispose()

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-screenshot-${{ matrix.id }}
          path: rustdesk_${{ matrix.id }}.png
          if-no-files-found: warn

      - name: Keep Alive (355 mins)
        run: |
          $end = (Get-Date).AddMinutes(355)
          while ((Get-Date) -lt $end) {
            Write-Host "[RDP/RustDesk] Heartbeat $(Get-Date.ToString('HH:mm:ss')) | Ends at $($end.ToString('HH:mm:ss'))"
            Start-Sleep -Seconds 60
          }
