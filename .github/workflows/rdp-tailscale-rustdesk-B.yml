name: Pure RDP + Tailscale Minimal Linux

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth key (reusable or ephemeral)"
        required: true
      rdp_count:
        description: "How many RDP instances (1-10)"
        required: false
        default: "1"

permissions:
  contents: read
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - id: mk
        run: |
          $n = [int]"${{ inputs.rdp_count }}"
          if ($n -lt 1) { $n = 1 }
          if ($n -gt 10) { $n = 10 }
          $inc = @(); for ($i=1; $i -le $n; $i++){ $inc += @{ id = $i } }
          $json = @{ include = $inc } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  rdp:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
    timeout-minutes: 360
    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345
      TS_HOSTNAME: bullet${{ matrix.id }}

    steps:
      - name: Install & Connect Tailscale
        run: |
          echo "Downloading and installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          
          echo "Connecting to Tailscale..."
          sudo tailscale up --authkey="${{ inputs.ts_authkey }}" --hostname="${TS_HOSTNAME}" --accept-routes --accept-dns=false
          
          ip4=$(tailscale ip -4)
          echo "Tailscale IP: $ip4"

      - name: Install Desktop Environment & Fix XRDP
        run: |
          sudo apt-get update
          
          # Install only what is needed for RDP
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies xrdp xorgxrdp
          
          # Add xrdp user to ssl-cert group to prevent permission issues
          sudo adduser xrdp ssl-cert
          
          # Create the RDP user
          sudo useradd -m -s /bin/bash $RDP_USER
          echo "$RDP_USER:$RDP_PASS" | sudo chpasswd
          sudo usermod -aG sudo $RDP_USER
          
          # 1. Set .xsession for the user
          echo "startxfce4" | sudo tee /home/$RDP_USER/.xsession
          sudo chown $RDP_USER:$RDP_USER /home/$RDP_USER/.xsession
          
          # 2. OVERRIDE startwm.sh (This fixes the crash at the login screen)
          sudo sed -i 's/^test -x \/etc\/X11\/Xsession/# test -x \/etc\/X11\/Xsession/' /etc/xrdp/startwm.sh
          sudo sed -i 's/^exec \/bin\/sh \/etc\/X11\/Xsession/# exec \/bin\/sh \/etc\/X11\/Xsession/' /etc/xrdp/startwm.sh
          echo "startxfce4" | sudo tee -a /etc/xrdp/startwm.sh
          
          sudo systemctl restart xrdp
          echo "RDP User and XRDP Server configured successfully."

      - name: Keep Alive (355 mins)
        run: |
          end_time=$(( $(date +%s) + 355*60 ))
          while [ $(date +%s) -lt $end_time ]; do
            echo "[Linux RDP] Heartbeat $(date +'%H:%M:%S') | Ends at $(date -d @$end_time +'%H:%M:%S')"
            sleep 60
          done
