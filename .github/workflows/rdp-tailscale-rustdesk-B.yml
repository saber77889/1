- name: Launch Virtual Display, RustDesk & Screenshot
        run: |
          # 1. Manually set XDG variables to fix the XFCE failsafe error
          export XDG_CONFIG_DIRS=/etc/xdg
          export XDG_DATA_DIRS=/usr/share:/usr/share/xfce4:/usr/local/share
          
          # 2. Start a virtual X server on display :99
          Xvfb :99 -screen 0 1280x1024x24 &
          export DISPLAY=:99
          sleep 2
          
          # 3. Start the desktop environment wrapped in dbus
          dbus-run-session xfce4-session &
          sleep 5
          
          # 4. Launch RustDesk in the background
          rustdesk &
          sleep 10
          
          # 5. Take screenshot of the virtual display
          scrot rustdesk_${{ matrix.id }}.png
